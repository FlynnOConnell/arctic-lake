[project]
name = "docs"
version = "0.1.0"
description = "Export Obsidian/Markdown notes to self-contained HTML and PDF"
readme = "README.md"
requires-python = ">=3.12.9"
dependencies = [
    "markdown>=3.10",
    "pygments>=2.19.2",
    "weasyprint>=67.0",
]

[project.scripts]
export-note = "scripts.export_note:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]
